name: disc_clock
description: Disc clock.
version: 1.0.0

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_clock_helper:
    path: ../flutter_clock_helper
  cupertino_icons: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/1.webp
    - assets/2.webp
    - assets/3.webp
    - assets/4.webp
    - assets/5.webp
    - assets/6.webp
    - assets/overlay.webp
    - assets/spacer.webp
    - assets/weather.webp
    - assets/inner.webp
  fonts:
    - family: VT323
      fonts:
        - asset: third_party/VT323-Regular.ttf
