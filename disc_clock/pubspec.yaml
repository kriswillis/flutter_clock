name: disc_clock
description: Disc clock.
version: 1.0.0

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_clock_helper:
    path: ../flutter_clock_helper
  cupertino_icons: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/light/1.webp
    - assets/light/2.webp
    - assets/light/3.webp
    - assets/light/4.webp
    - assets/light/5.webp
    - assets/light/6.webp
    - assets/light/spacer.webp
    - assets/light/weather.webp
    - assets/dark/1.webp
    - assets/dark/2.webp
    - assets/dark/3.webp
    - assets/dark/4.webp
    - assets/dark/5.webp
    - assets/dark/6.webp
    - assets/dark/spacer.webp
    - assets/dark/weather.webp
    - assets/inner.webp
    - assets/overlay.webp
  fonts:
    - family: VT323
      fonts:
        - asset: third_party/VT323-Regular.ttf
